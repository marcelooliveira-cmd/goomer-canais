<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partner Briefing — Goomer Canais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --blue:#1A47E8;--blue-light:#E8ECFD;--blue-50:#F0F3FF;
  --orange:#FF9700;--green:#16A34A;--green-light:#DCFCE7;
  --red:#DC2626;--red-light:#FEE2E2;--amber:#D97706;--amber-light:#FEF3C7;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;
  --r:10px;--f:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--g50);color:var(--g900);}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--g200);padding:0 20px;
  display:flex;align-items:center;gap:16px;min-height:54px;position:sticky;top:0;z-index:200;}
.lmark{width:28px;height:28px;background:var(--blue);border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lmark svg{width:15px;height:15px;}
.app-t{font-size:14px;font-weight:600;white-space:nowrap;}
.psel-wrap{flex:1;display:flex;align-items:center;gap:8px;max-width:480px;margin:0 auto;}
.psel-wrap label{font-size:12px;color:var(--g500);font-weight:500;white-space:nowrap;}
.psel{flex:1;padding:7px 10px;border:1.5px solid var(--g200);border-radius:8px;
  font-size:13px;font-family:var(--f);outline:none;background:var(--g50);cursor:pointer;
  color:var(--g900);}
.psel:focus{border-color:var(--blue);}
.hdr-ref{font-size:11px;color:var(--g400);white-space:nowrap;margin-left:auto;}

/* DETAIL WRAP */
.det{max-width:880px;margin:0 auto;padding:20px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:380px;color:var(--g400);gap:10px;text-align:center;}
.empty svg{width:38px;height:38px;stroke:var(--g300);fill:none;}
.empty p{font-size:14px;line-height:1.5;}

/* PARTNER HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.pi{display:flex;align-items:center;gap:11px;}
.av{width:44px;height:44px;border-radius:11px;background:var(--blue);color:#fff;
  font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.pn{font-size:17px;font-weight:600;margin-bottom:4px;}
.ptg{display:flex;gap:5px;flex-wrap:wrap;}
.tg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;}
.te{background:var(--g100);color:var(--g700);}
.tp{background:var(--blue-light);color:var(--blue);}
.bt{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.bBronze{background:#FEF3C7;color:#92400E;}
.bPrata{background:#F3F4F6;color:#374151;}
.bOuro{background:#FEF9C3;color:#713F12;}
.bBlack{background:#1F2937;color:#F9FAFB;}
.tal{padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;}
.ta-alta{background:var(--green-light);color:#15803D;}
.ta-queda{background:var(--red-light);color:var(--red);}
.ta-estavel{background:var(--g100);color:var(--g700);}
.ta-novo{background:var(--amber-light);color:var(--amber);}
.ta-inativo{background:var(--g100);color:var(--g500);}

/* KPI 4 */
.k4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
.kp{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:12px 13px;}
.kpl{font-size:11px;color:var(--g400);margin-bottom:2px;}
.kpv{font-size:18px;font-weight:600;line-height:1.1;}
.kps{font-size:11px;color:var(--g400);margin-top:2px;}
.kpd{font-size:11px;font-weight:500;margin-top:2px;}
.dup{color:var(--green);}.ddn{color:var(--red);}.dne{color:var(--g400);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:11px;}
.cd{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;}
.cdt{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:10px;}

/* NIVEL */
.nv{font-size:19px;font-weight:700;}
.ns{font-size:11px;color:var(--g400);margin-top:2px;margin-bottom:8px;}
.pt{height:7px;background:var(--g200);border-radius:4px;overflow:hidden;margin-bottom:5px;}
.pf{height:100%;border-radius:4px;background:var(--blue);transition:width .5s;}
.pl{display:flex;justify-content:space-between;font-size:9px;color:var(--g400);}
.gb{background:var(--blue-50);border:1.5px solid var(--blue-light);border-radius:8px;
  padding:10px 12px;margin-top:10px;}
.gl{font-size:12px;color:var(--blue);margin-bottom:2px;}
.gv{font-size:15px;font-weight:700;color:var(--blue);}
.gn{font-size:10px;color:var(--g500);margin-top:2px;}
.pn2{font-size:11px;color:var(--g500);background:var(--g50);border-radius:6px;
  padding:7px 9px;margin-top:7px;line-height:1.5;}

/* TABELA QQ */
.qqt{width:100%;border-collapse:collapse;font-size:12px;}
.qqt th{padding:5px 8px;background:var(--g50);color:var(--g500);font-weight:500;
  text-align:center;border-bottom:1px solid var(--g100);font-size:11px;}
.qqt th:first-child{text-align:left;}
.qqt td{padding:5px 8px;border-bottom:1px solid var(--g100);
  color:var(--g700);text-align:center;}
.qqt td:first-child{text-align:left;font-weight:500;}
.qqt tr:last-child td{border-bottom:none;}
.qqt tr:hover td{background:var(--g50);}
.qqc td{background:var(--blue-50)!important;color:var(--blue);font-weight:600;}
.qqc td:first-child{border-left:3px solid var(--blue);}

/* STATS */
.sb{display:flex;gap:7px;}
.sx{flex:1;background:var(--g50);border-radius:7px;padding:9px;text-align:center;}
.sv{font-size:17px;font-weight:600;}
.sl{font-size:10px;color:var(--g400);margin-top:2px;}
.cb{background:var(--green-light);border-radius:8px;padding:11px 13px;
  display:flex;justify-content:space-between;align-items:center;}
.cv{font-size:18px;font-weight:700;color:var(--green);}
.cl2{font-size:11px;color:#15803D;}
.cbg{background:#fff;border-radius:5px;padding:3px 9px;font-size:12px;font-weight:700;color:var(--green);}

/* ═══ FORMULÁRIO DE REGISTRO ═══ */
.form-section{background:#fff;border:1px solid var(--g200);border-radius:var(--r);
  padding:20px;margin-top:4px;}
.form-title{font-size:13px;font-weight:600;color:var(--g900);margin-bottom:4px;}
.form-sub{font-size:12px;color:var(--g500);margin-bottom:18px;}
.form-divider{height:1px;background:var(--g100);margin:18px 0;}
.field{margin-bottom:16px;}
.field-label{font-size:12px;font-weight:600;color:var(--g700);margin-bottom:6px;display:block;}
.field-label span{font-weight:400;color:var(--g400);margin-left:4px;}
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tipo-opt{border:1.5px solid var(--g200);border-radius:8px;padding:10px 12px;
  cursor:pointer;text-align:center;transition:all .15s;background:var(--g50);}
.tipo-opt:hover{border-color:var(--blue);background:var(--blue-50);}
.tipo-opt.sel{border-color:var(--blue);background:var(--blue-50);}
.tipo-opt.sel .to-name{color:var(--blue);font-weight:600;}
.to-name{font-size:13px;font-weight:500;color:var(--g700);}
.to-desc{font-size:10px;color:var(--g400);margin-top:2px;}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.date-input{width:100%;padding:9px 11px;border:1.5px solid var(--g200);border-radius:8px;
  font-size:13px;font-family:var(--f);outline:none;background:var(--g50);color:var(--g900);
  cursor:pointer;}
.date-input:focus{border-color:var(--blue);background:#fff;}
textarea.task-input{width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:8px;
  font-size:13px;font-family:var(--f);outline:none;background:var(--g50);color:var(--g900);
  resize:vertical;min-height:90px;line-height:1.5;}
textarea.task-input:focus{border-color:var(--blue);background:#fff;}
textarea.task-input::placeholder{color:var(--g400);}
.form-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;align-items:center;}
.form-status{font-size:12px;color:var(--g500);margin-right:auto;}
.form-status.ok{color:var(--green);}
.form-status.err{color:var(--red);}
.btn-send{padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f);
  display:flex;align-items:center;gap:7px;transition:background .15s;}
.btn-send:hover{background:#1438c0;}
.btn-send:disabled{background:var(--g300);cursor:not-allowed;}
.btn-send svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;}
.btn-clear{padding:10px 16px;background:#fff;color:var(--g700);border:1.5px solid var(--g200);
  border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--f);}
.btn-clear:hover{background:var(--g50);}
.spinner-btn{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
@media(max-width:680px){
  .k4{grid-template-columns:repeat(2,1fr);}
  .g2,.g3{grid-template-columns:1fr;}
  .tipo-grid{grid-template-columns:1fr;}
  .date-row{grid-template-columns:1fr;}
  .psel-wrap label{display:none;}
}
</style>
</head>

(function(){

    var g=document.createElement('optgroup');
    g.label=nv+' ('+grps[nv].length+')';
    grps[nv].forEach(function(p){
      var o=document.createElement('option');
      o.value=p.id;

    if(this.value) showDetail(this.value);

            '<div class="to-desc">Follow-up presencial ou online</div>'+
          '</div>'+
          '<div class="tipo-opt" id="tipoFUPA" data-tipo="FUP-ASYNC">'+
            '<div class="to-name">FUP \u2014 Ass\u00edncrono</div>'+
            '<div class="to-desc">Whatsapp, e-mail, ligação</div>'+
          '</div>'+
          '<div class="tipo-opt" id="tipoQBR" data-tipo="QBR">'+
            '<div class="to-name">QBR</div>'+
            '<div class="to-desc">Quarterly Business Review</div>'+
          '</div>'+
        '</div>'+
      '</div>'+

      '<div class="date-row">'+
        '<div class="field">'+
          '<label class="field-label" for="dtReu">Data da reuni\u00e3o <span>*</span></label>'+
          '<input type="date" id="dtReu" class="date-input">'+
        '</div>'+
        '<div class="field">'+
          '<label class="field-label" for="dtProx">Data da pr\u00f3xima reuni\u00e3o <span>*</span></label>'+
          '<input type="date" id="dtProx" class="date-input">'+
        '</div>'+
      '</div>'+

      '<div class="field">'+
        '<label class="field-label" for="tarefas">Tarefas criadas ap\u00f3s a reuni\u00e3o <span>(opcional)</span></label>'+
        '<textarea id="tarefas" class="task-input" placeholder="Ex:\n- Enviar proposta comercial at\u00e9 sexta\n- Agendar demo com equipe de vendas\n- Compartilhar material de onboarding"></textarea>'+
      '</div>'+

      '<div class="form-divider"></div>'+
      '<div class="form-footer">'+
        '<span class="form-status" id="formStatus"></span>'+
        '<button class="btn-clear" onclick="clearForm()">Limpar</button>'+
        '<button class="btn-send" id="btnEnviar" onclick="enviarSlack()">'+
          '<svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>'+
          'Enviar para Slack'+
        '</button>'+
      '</div>'+
    '</div>';

  // Chart
  if(pCh){try{pCh.destroy();}catch(e){}}
  var ctx=document.getElementById('pCv');
  if(ctx&&sr.length){
    pCh=new Chart(ctx,{type:'bar',
      data:{labels:sr.map(function(s){return s.mes;}),
        datasets:[{data:sr.map(function(s){return s.mrr;}),
          backgroundColor:sr.map(function(_,i){return i===sr.length-1?CB:CBL;}),
          borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:function(c){return 'R$'+Math.round(c.raw).toLocaleString('pt-BR');}}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:9},color:'#9CA3AF'}},
          y:{display:false}}}});
  }

  // Resetar form
  clearForm();
}

// ── FORMULÁRIO ────────────────────────────────────────────────────────────────
var tipoSel='';

function selTipo(t){
  tipoSel=t;
  var ids={
    'FUP':'tipoFUP',
    'FUP - Ass\u00edncrono':'tipoFUPA',
    'QBR':'tipoQBR'
  };
  Object.values(ids).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('sel');
  });
  if(ids[t]){
    var el=document.getElementById(ids[t]);
    if(el) el.classList.add('sel');
  }
}

function clearForm(){
  tipoSel='';
  ['tipoFUP','tipoFUPA','tipoQBR'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('sel');
  });
  var dtReu=document.getElementById('dtReu');
  var dtProx=document.getElementById('dtProx');
  var tarefas=document.getElementById('tarefas');
  var status=document.getElementById('formStatus');
  if(dtReu) dtReu.value='';
  if(dtProx) dtProx.value='';
  if(tarefas) tarefas.value='';
  if(status){status.textContent='';status.className='form-status';}
}

function fmtDate(s){
  if(!s) return '\u2014';
  var p=s.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

async function enviarSlack(){
  if(!currentPartner){setStatus('Selecione um parceiro primeiro.','err');return;}
  if(!tipoSel){setStatus('Selecione o tipo de reuni\u00e3o.','err');return;}
  var dtReu=document.getElementById('dtReu').value;
  var dtProx=document.getElementById('dtProx').value;
  if(!dtReu){setStatus('Informe a data da reuni\u00e3o.','err');return;}
  if(!dtProx){setStatus('Informe a data da pr\u00f3xima reuni\u00e3o.','err');return;}
  var tarefas=document.getElementById('tarefas').value.trim();

  var btn=document.getElementById('btnEnviar');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner-btn"></div> Enviando...';
  setStatus('','');

  try{
    var resp=await fetch('https://hooks.slack.com/services/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',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        text:
          '*\ud83d\udcca Registro de Reuni\u00e3o \u2014 Partner Briefing*\n\n' +
          '*Parceiro:* ' + currentPartner.revenda + '\n' +
          '*Executivo:* ' + currentPartner.consultor + '\n' +
          '*N\u00edvel:* ' + currentPartner.nivel + '\n' +
          '\u2015\u2015\u2015\u2015\u2015\u2015\u2015\u2015\n' +
          '*Tipo de reuni\u00e3o:* ' + tipoSel + '\n' +
          '*Data da reuni\u00e3o:* ' + fmtDate(dtReu) + '\n' +
          '*Pr\u00f3xima reuni\u00e3o:* ' + fmtDate(dtProx) + '\n' +
          '\u2015\u2015\u2015\u2015\u2015\u2015\u2015\u2015\n' +
          '*Tarefas criadas:*\n' + (tarefas || '_Nenhuma tarefa registrada_')
      })
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    setStatus('\u2713 Registrado e enviado ao Slack!','ok');
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg> Enviar para Slack';
    btn.disabled=false;
    document.getElementById('dtReu').value='';
    document.getElementById('dtProx').value='';
    document.getElementById('tarefas').value='';
  }catch(err){
    setStatus('Erro ao enviar: '+err.message,'err');
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg> Enviar para Slack';
    btn.disabled=false;
  }
}

function setStatus(msg,type){
  var el=document.getElementById('formStatus');
  if(!el) return;
  el.textContent=msg;
  el.className='form-status'+(type?' '+type:'');
}

// Event delegation para tipo de reunião
document.addEventListener('click', function(e){
  var opt = e.target.closest('.tipo-opt');
  if(!opt) return;
  var tipos = {'FUP':'FUP','FUP-ASYNC':'FUP — Assíncrono','QBR':'QBR'};
  var key = opt.getAttribute('data-tipo');
  if(key) selTipo(tipos[key]||key);
});

</script>
